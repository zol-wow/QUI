name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=${TAG}" >> $GITHUB_OUTPUT

          # Determine release channel from tag suffix
          if [[ "$TAG" == *-alpha* ]]; then
            echo "release_type=alpha" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *-beta* ]]; then
            echo "release_type=beta" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "release_type=release" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate search cache
        run: |
          lua5.1 tools/generate_search_cache.lua
          lua5.1 tools/audit_search_cache.lua

      - name: Create addon zip
        run: |
          set -euo pipefail

          # All shipped sub-addon sibling folders (QUI_Debug is NOT listed here).
          suite_folders=(
            QUI_Options QUI_OptionsSearch
            QUI_ActionBars QUI_CDM QUI_Chat QUI_GroupFrames QUI_ResourceBars QUI_UnitFrames
            QUI_Skinning QUI_Minimap QUI_QoL QUI_DamageMeter
          )

          rm -rf build
          mkdir -p build/QUI
          for folder in "${suite_folders[@]}"; do
            mkdir -p "build/$folder"
          done

          main_root_files=(
            QUI.toc
            init.lua
          )
          main_runtime_dirs=(
            assets
            core
            importstrings
            libs
            modules
          )

          for file in "${main_root_files[@]}"; do
            test -f "$file"
            cp -p "$file" "build/QUI/$file"
          done

          for dir in "${main_runtime_dirs[@]}"; do
            test -d "$dir"
            mkdir -p "build/QUI/$dir"
            rsync -a --exclude='.DS_Store' "$dir/" "build/QUI/$dir/"
          done

          for folder in "${suite_folders[@]}"; do
            rsync -a --exclude='.DS_Store' "$folder/" "build/$folder/"
          done

          # re-add specific documentation files we want in the release
          cp README.md build/QUI/ 2>/dev/null || true
          cp CHANGELOG.md build/QUI/ 2>/dev/null || true
          cp LICENSE build/QUI/ 2>/dev/null || true

          required_paths=(
            build/QUI/QUI.toc
            build/QUI/init.lua
            build/QUI/core/defaults.lua
            build/QUI/libs/LibStub/LibStub.lua
            build/QUI/importstrings/qui_editmode_base.lua
            build/QUI/assets/QUI.tga
            build/QUI_Options/QUI_Options.toc
            build/QUI_Options/bootstrap.lua
            build/QUI_Options/init.lua
            build/QUI_Options/tiles/action_bars.lua
            build/QUI_OptionsSearch/QUI_OptionsSearch.toc
            build/QUI_OptionsSearch/search_cache.lua
            build/QUI_ActionBars/QUI_ActionBars.toc
            build/QUI_ActionBars/bootstrap.lua
            build/QUI_CDM/QUI_CDM.toc
            build/QUI_CDM/bootstrap.lua
            build/QUI_Chat/QUI_Chat.toc
            build/QUI_Chat/bootstrap.lua
            build/QUI_GroupFrames/QUI_GroupFrames.toc
            build/QUI_GroupFrames/bootstrap.lua
            build/QUI_ResourceBars/QUI_ResourceBars.toc
            build/QUI_ResourceBars/bootstrap.lua
            build/QUI_UnitFrames/QUI_UnitFrames.toc
            build/QUI_UnitFrames/bootstrap.lua
            build/QUI_Skinning/QUI_Skinning.toc
            build/QUI_Skinning/bootstrap.lua
            build/QUI_Minimap/QUI_Minimap.toc
            build/QUI_Minimap/bootstrap.lua
            build/QUI_QoL/QUI_QoL.toc
            build/QUI_QoL/bootstrap.lua
            build/QUI_DamageMeter/QUI_DamageMeter.toc
            build/QUI_DamageMeter/bootstrap.lua
          )

          for required_path in "${required_paths[@]}"; do
            if [[ ! -e "$required_path" ]]; then
              echo "Missing packaged path: $required_path" >&2
              exit 1
            fi
          done

          forbidden_paths=(
            build/QUI/.git
            build/QUI/.github
            build/QUI/docs
            build/QUI/tests
            build/QUI/tools
            build/QUI/QUI_Options
            build/QUI/QUI_Debug
            build/QUI_Debug
          )

          for forbidden_path in "${forbidden_paths[@]}"; do
            if [[ -e "$forbidden_path" ]]; then
              echo "Non-runtime path packaged: $forbidden_path" >&2
              exit 1
            fi
          done

          # Stamp every shipped .toc's "## Version:" from the release tag so the
          # packaged addon always matches the tag (the tag is the single source
          # of truth) no matter what the committed .toc files happen to read.
          # QUI_Debug is in forbidden_paths and is excluded from this glob.
          toc_version="${{ steps.version.outputs.version }}"
          toc_version="${toc_version#v}"   # v4.0.0-beta9 -> 4.0.0-beta9
          for toc in build/QUI/QUI.toc build/*/QUI_*.toc; do
            sed -i "s/^## Version:.*/## Version: ${toc_version}/" "$toc"
            # Fail loudly if the substitution didn't land (e.g. the header
            # format changed) rather than silently shipping a stale version.
            grep -qx "## Version: ${toc_version}" "$toc" || {
              echo "Failed to stamp version into $toc" >&2
              exit 1
            }
          done

          # create the zip from inside build/ so the paths are QUI/... QUI_Options/... etc.
          rm -f QUI-${{ steps.version.outputs.version }}.zip
          cd build
          zip -r ../QUI-${{ steps.version.outputs.version }}.zip QUI "${suite_folders[@]}"

      - name: Extract changelog for release
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          # Looks for ## [vX.Y.Z] or ## vX.Y.Z and captures until next ## or EOF
          VERSION="${{ steps.version.outputs.version }}"

          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk -v ver="$VERSION" '
              /^## / {
                if (found) exit
                if ($0 ~ ver) { found=1; next }
              }
              found { print }
            ' CHANGELOG.md)

            if [ -z "$NOTES" ]; then
              NOTES="Release $VERSION"
            fi
          else
            NOTES="Release $VERSION"
          fi

          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          files: QUI-${{ steps.version.outputs.version }}.zip
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to CurseForge
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          CHANGELOG=$(cat release_notes.txt)
          # CurseForge WoW Retail game version IDs:
          # 12.0.0 = 13924, 12.0.1 = 14422, 12.0.5 = 15855
          METADATA=$(jq -n \
            --arg changelog "$CHANGELOG" \
            --arg name "QUI-${{ steps.version.outputs.version }}" \
            --arg reltype "${{ steps.version.outputs.release_type }}" \
            '{
              changelog: $changelog,
              changelogType: "markdown",
              displayName: $name,
              gameVersions: [13924,14422,15855],
              releaseType: $reltype
            }')
          
          curl --fail-with-body -X POST \
            "https://wow.curseforge.com/api/projects/${{ secrets.CF_PROJECT_ID }}/upload-file" \
            -H "X-Api-Token: ${CF_API_TOKEN}" \
            -F "metadata=${METADATA}" \
            -F "file=@QUI-${{ steps.version.outputs.version }}.zip"

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_DEV_WEBHOOK: ${{ secrets.DISCORD_DEV_WEBHOOK_URL }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TYPE: ${{ steps.version.outputs.release_type }}
          REPO: ${{ github.repository }}
        run: |
          # Read the extracted changelog
          CHANGELOG=$(cat release_notes.txt)

          # Construct URLs
          RELEASE_URL="https://github.com/$REPO/releases/tag/$VERSION"
          ZIP_URL="https://github.com/$REPO/releases/download/$VERSION/QUI-$VERSION.zip"

          # Truncate changelog if it exceeds Discord's 4096 character embed limit
          if [ ${#CHANGELOG} -gt 4000 ]; then
            CHANGELOG="${CHANGELOG:0:4000}... *(Changelog truncated, view GitHub release for full notes)*"
          fi

          # Pick webhook and message based on release type
          if [ "$RELEASE_TYPE" = "release" ]; then
            WEBHOOK="$DISCORD_WEBHOOK"
            LABEL="New QUI Release"
            EMOJI="🚀"
            COLOR=3447003
            FOOTER="\n\n💖 *A massive thank you to everyone using the addon, raising issues, requesting new features, testing tirelessly, contributing merge requests, and supporting development via Ko-Fi or PayPal!*\n\n"
          else
            WEBHOOK="$DISCORD_DEV_WEBHOOK"
            CHANNEL_LABEL=$(echo "$RELEASE_TYPE" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')
            LABEL="New QUI ${CHANNEL_LABEL}"
            EMOJI="🧪"
            COLOR=16761095
            if [[ "$RELEASE_TYPE" =~ ^[aeiou] ]]; then ARTICLE="an"; else ARTICLE="a"; fi
            FOOTER="\n\n⚠️ *This is ${ARTICLE} ${RELEASE_TYPE} build — expect bugs. Please report issues on GitHub!*\n\n"
          fi

          # Use jq to safely format the multi-line text into valid JSON
          JSON_PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg url "$RELEASE_URL" \
            --arg zip "$ZIP_URL" \
            --arg changelog "$CHANGELOG" \
            --arg label "$LABEL" \
            --arg emoji "$EMOJI" \
            --arg footer "$FOOTER" \
            --argjson color "$COLOR" \
            '{
              content: "\($emoji) **\($label):** \($version)\n\n📥 **[Download \($version) zip](\($zip))**\n🔗 [View Release on GitHub](\($url))\($footer)",
              embeds: [
                {
                  title: "Changelog",
                  description: $changelog,
                  color: $color
                }
              ]
            }')

          # Send the request to Discord
          curl -H "Content-Type: application/json" -d "$JSON_PAYLOAD" $WEBHOOK
