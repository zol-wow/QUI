title: QUI Documentation
description: "Documentation for QUI -- a comprehensive World of Warcraft UI addon for Midnight (12.0+)."
url: "https://zol-wow.github.io"
baseurl: "/QUI"

remote_theme: just-the-docs/just-the-docs

color_scheme: dark

search_enabled: true
search.heading_level: 3
search.previews: 3
search.preview_words_before: 5
search.preview_words_after: 10
search.tokenizer_separator: /[\s/]+/

heading_anchors: true

aux_links:
  GitHub:
    - "https://github.com/zol-wow/QUI"
  Discord:
    - "https://discord.gg/FFUjA4JXnH"
  CurseForge:
    - "https://www.curseforge.com/wow/addons/qui-community-edition"
  Ko-fi:
    - "https://ko-fi.com/zol__"

aux_links_new_tab: true

footer_content: "QUI Community Edition &mdash; Originally created by Quazii, maintained by Zol."

plugins:
  - jekyll-remote-theme

exclude:
  - "*.lua"
  - "*.xml"
  - "*.toc"
  - libs/
  - modules/
  - core/
  - options/
  - skinning/
  - importstrings/
  - init.lua
  - load.xml
  - Bindings.xml
  - CHANGELOG.md
  - LICENSE
  - README.md
  - .gitignore
  - node_modules/
  - vendor/
  - Gemfile
  - Gemfile.lock
